apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: weather-dashboard-prod

resources:
  - ../../base

commonLabels:
  environment: prod

patchesStrategicMerge:
  - backend-patch.yaml
  - frontend-patch.yaml
  - configmap-patch.yaml

images:
  - name: quay.io/vtsugran/weather-backend
    newTag: "stable"
  - name: quay.io/vtsugran/weather-frontend
    newTag: "stable"
